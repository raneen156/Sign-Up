<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="css/app.css">
  <link rel="stylesheet" href="css/all.min.css">
  <title>Blue Signup Form</title>
</head>

<body>
  <div class="container">
    <div class="sign-up">
      <h1>Sign Up</h1>
      <form action="">
        <div class="row">
          <div class="col-12">
            <input type="text" placeholder="Name *"> <i class="fa-solid fa-user"></i>
          </div>
          <div class="col-12">
            <input type="email" placeholder="Email *"> <i class="fa-solid fa-envelope"></i>
          </div>
          <div class="col-12">
            <input type="password" placeholder="Password *"> <i class="fa-solid fa-lock"></i>
          </div>
          <div class="col-12">
            <input type="password" placeholder="Confirm Password *"> <i class="fa-solid fa-lock"></i>
          </div>
          <div class="col-12">
            <button>Login</button>
          </div>
          <div class="col-12 have-account">
            <p>have account? <a href="">Login Here</a></p>
          </div>
        </div>
      </form>
      <div class="register">
        <h3>Or Register With</h3>
        <div class="links">
          <div class="facebook"><i class="fa-brands fa-facebook-f"></i></div>
          <div class="x"><i class="fa-brands fa-x-twitter"></i></div>
          <div class="google"><i class="fa-brands fa-google-plus-g"></i></div>
        </div>
      </div>
    </div>
  </div>
</body>

</html>
